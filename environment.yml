name: cs224r-wire-untangling
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # PyTorch >=2.7 + CUDA 12.9 (Blackwell SM_100 support)
  # Build-string glob forces CUDA variant; without it the solver picks CPU.
  - pytorch>=2.7=*cuda129*
  - torchvision=*=*cuda129*
  - torchaudio=*=*cuda129*
  - cuda-version=12.9

  # Simulation
  - mujoco>=3.0.0
  - gymnasium>=0.29.0

  # RL / training
  - stable-baselines3>=2.0.0
  - tensorboard

  # Core
  - numpy>=1.24.0
  - h5py
  - pyyaml

  # Dev / testing
  - pytest>=7.0
  - pytest-cov

  # pip-only packages
  - pip
  - pip:
      - robosuite>=1.4.0
      - wandb
      - modal>=0.73
      - -e .
